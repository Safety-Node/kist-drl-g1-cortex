# Shared parameters for the cortex node graph.
# Topic names on /bridge/* must match what the onboard stack publishes on the
# shared DDS bridge domain (post-comm_bridge redesign).

stt_node:
  ros__parameters:
    # /bridge/* names follow the ICD; kist-ext-sensor-io owns the publisher.
    # If that repo lands on different names, change them here — not in code.
    audio_topic: /bridge/sensors/audio_pcm
    speaker_state_topic: /bridge/sensors/speaker_state
    estop_topic: /bridge/safety/estop
    transcript_topic: /cortex/stt/transcript
    backend: google_cloud        # google_cloud | dummy (dummy needs no credentials)
    language_code: ko-KR
    sample_rate_hz: 16000        # AudioPCM locked format
    interim_results: false       # false = publish only is_final transcripts
    highpass_hz: 120.0           # removes low-freq vibration / DC
    lowpass_hz: 5500.0           # preserves Korean fricatives (ㅅ/ㅎ/ㅊ)
    input_gain_db: 0.0           # amplifying in a noisy room backfires
    echo_cancel_tail_ms: 200     # mute this long after SpeakerState.playing clears
    echo_cancel_lead_ms: 0       # pre-mute; needs a tts->stt onset signal, so off

tts_node:
  ros__parameters:
    say_topic: /cortex/tts/say
    barge_in_topic: /cortex/tts/stop
    audio_out_topic: /bridge/cmd/audio_out
    estop_topic: /bridge/safety/estop
    backend: naver_clova
    language_code: ko-KR
    sample_rate_hz: 16000        # wire format (PC resamples — REQ-29)
    clova_sample_rate_hz: 24000  # Clova native request rate
    voice: nara
    speed: 0                     # Clova [-5, +5]
    request_timeout_s: 5.0       # on timeout: log + drop, no retry

orchestrator_node:
  ros__parameters:
    # scenario_dir: default = installed share/cortex_cognition/scenarios.
    # Override to point at a source dir during development.
    transcript_topic: /cortex/stt/transcript
    status_topic: /cortex/task_status
    verdict_topic: /cortex/critic/verdict
    active_subtask_topic: /cortex/active_subtask
    say_topic: /cortex/tts/say
    handler_status_topic: /bridge/handler/status
    tick_rate_hz: 10.0
    cancel_timeout_sec: 2.0    # wait for stop-confirm before escalating (E-STOP)
    assume_stopped: true       # DEV: no Handler yet. false = use real CommandStatus

vlm_node:
  ros__parameters:
    image_topic: /bridge/sensors/camera/color
    active_subtask_topic: /cortex/active_subtask
    verdict_topic: /cortex/critic/verdict
    period_sec: 1.0
